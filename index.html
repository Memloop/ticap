<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d1014">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>TICAP</title>
<link rel="manifest" id="mf">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"></noscript>
<style id="css-base">
  :root{
    --bg:#0d1014; --card:#151a20; --sub:#1b212a; --line:#2a3340;
    --text:#e6e0d2; --dim:#98a1ac; --gold:#c9a227; --ember:#c0533e;
    --teal:#3e8e7e; --violet:#7c6bae; --blue:#4a7fa5;
    --bgc-core:#1c1810; --bgc-exp:#191424; --bgc-body:#1e1412;
    --glow:radial-gradient(ellipse 700px 400px at 50% -80px,#171d26 0%,transparent 60%);
    --scrim:rgba(6,8,10,.82);
    --tick:rgba(255,255,255,.15); --tickH:rgba(255,255,255,.25); --tickM:rgba(233,190,90,.7);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  /* без задержки клика/двойного тапа на телефонах — нажатие срабатывает мгновенно */
  button,.tab,.opt,.edit,.lvl,.b-btn,.btn-sm,.t-sm,.t-btn,.btn30,summary{touch-action:manipulation}
  body{
    background:var(--bg);background-image:var(--glow);
    color:var(--text);font-family:'Inter',sans-serif;font-size:15px;
    min-height:100vh;padding:calc(16px + env(safe-area-inset-top)) 14px 90px}
  .wrap{max-width:560px;margin:0 auto}

  header{text-align:center;margin-bottom:16px}
  .gem{width:40px;height:40px;transform:rotate(45deg);margin:0 auto 10px;
    background:linear-gradient(135deg,#2a2013,#0f0c07);border:1px solid var(--gold);
    box-shadow:0 0 16px rgba(201,162,39,.3);display:flex;align-items:center;justify-content:center}
  .gem span{transform:rotate(-45deg);font-family:'Cormorant',serif;font-weight:700;
    font-size:12px;color:var(--gold)}
  h1{font-family:'Cormorant',serif;font-weight:700;font-size:26px;letter-spacing:.1em}
  .subt{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.14em;
    color:var(--dim);text-transform:uppercase;margin-top:4px}

  .tabs{display:flex;gap:6px;margin-bottom:18px;background:var(--card);
    border:1px solid var(--line);border-radius:10px;padding:5px;
    position:sticky;top:calc(6px + env(safe-area-inset-top));z-index:5}
  .tab{flex:1;text-align:center;padding:10px 4px;border-radius:7px;cursor:pointer;
    font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.06em;
    color:var(--dim);text-transform:uppercase;border:1px solid transparent}
  .tab.on{background:var(--sub);color:var(--gold);border-color:var(--line)}
  .pane{display:none}.pane.on{display:block}

  .stats{display:flex;gap:8px;margin-bottom:16px}
  .stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:8px;
    padding:9px 6px;text-align:center}
  .stat .v{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;color:var(--gold)}
  .stat .l{font-size:9.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-top:3px}

  .box{background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:14px;margin-bottom:16px}
  .row{display:flex;gap:8px}
  input[type=text],textarea,select{flex:1;background:var(--sub);border:1px solid var(--line);border-radius:7px;
    color:var(--text);font-family:'Inter',sans-serif;font-size:15px;padding:10px 12px;outline:none;width:100%}
  select{appearance:none;-webkit-appearance:none}
  textarea{resize:vertical;min-height:56px;line-height:1.4}
  input:focus,textarea:focus,select:focus{border-color:var(--gold)}
  input::placeholder,textarea::placeholder{color:var(--dim);opacity:.65}
  .de-in{width:84px !important;flex:none !important;color:var(--gold) !important;
    font-family:'JetBrains Mono',monospace !important;font-weight:600;text-align:center}
  .hint{font-size:11px;color:var(--dim);margin-top:8px;font-family:'JetBrains Mono',monospace;line-height:1.5}
  .lbl{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;
    color:var(--dim);text-transform:uppercase;margin:12px 0 5px}
  .lbl:first-child{margin-top:0}
  .btn-g{width:100%;margin-top:12px;background:linear-gradient(135deg,#3a2f12,#241d0b);
    border:1px solid var(--gold);border-radius:8px;color:var(--gold);
    font-family:'Cormorant',serif;font-weight:700;font-size:17px;letter-spacing:.08em;
    padding:11px;cursor:pointer}
  .btn-g:active{transform:scale(.985)}

  .alloc{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--gold);
    border-radius:10px;padding:14px;margin-bottom:13px}
  .alloc.retro-card{border-left-color:var(--violet)}
  .alloc.done-card{border-left-color:var(--teal);opacity:.92}
  .alloc.dead-card{border-left-color:var(--ember);opacity:.88}
  .a-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .a-name{font-weight:600;font-size:16px;line-height:1.3}
  .a-de{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--gold);white-space:nowrap}
  .a-nums{display:flex;justify-content:space-between;margin-top:8px;
    font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--dim)}
  .a-nums b{color:var(--text);font-weight:600}
  .edit{color:var(--dim);cursor:pointer;font-size:14px;padding:2px 6px;opacity:.7}
  .edit:active{opacity:1;color:var(--gold)}
  .drag{color:var(--dim);cursor:grab;font-size:18px;padding:8px 14px 8px 2px;
    margin:-8px 0;display:inline-block;touch-action:none;user-select:none;
    -webkit-user-select:none;-webkit-touch-callout:none;opacity:.6}
  .dragging{opacity:.94;position:relative;z-index:6;
    box-shadow:0 10px 26px rgba(0,0,0,.45)}
  .alloc.dragging{border-color:var(--gold)}

  .bar{margin-top:8px;height:22px;background:var(--sub);border:1px solid var(--line);
    border-radius:6px;overflow:hidden;position:relative}
  .bar.slim{height:16px;margin-top:6px}
  .fill{height:100%;background:linear-gradient(90deg,#7a5f14,var(--gold))}
  .done-card .fill{background:linear-gradient(90deg,#2a5f54,var(--teal))}
  .dead-card .fill{background:linear-gradient(90deg,#6e2f24,var(--ember))}
  .ticks{position:absolute;inset:0;display:flex;pointer-events:none}
  .ticks i{flex:1;border-right:1px solid var(--bg);opacity:.5}
  .ticks i:last-child{border-right:none}
  .pct{position:absolute;right:7px;top:50%;transform:translateY(-50%);
    font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;
    color:var(--text);text-shadow:0 1px 3px rgba(0,0,0,.4)}

  .a-actions{display:flex;gap:8px;margin-top:11px}
  .btn30{flex:1;background:linear-gradient(135deg,#3a2f12,#241d0b);border:1px solid var(--gold);
    border-radius:8px;color:var(--gold);font-family:'JetBrains Mono',monospace;
    font-size:14px;font-weight:600;padding:12px;cursor:pointer;letter-spacing:.04em}
  .btn30:active{transform:scale(.98)}
  .btn-sm{background:var(--sub);border:1px solid var(--line);border-radius:8px;
    color:var(--dim);font-size:13px;padding:12px 13px;cursor:pointer;
    font-family:'JetBrains Mono',monospace}
  .btn-sm:active{transform:scale(.96)}
  .btn-kill{border-color:#5a3a34;color:#c98874}

  .retro{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line)}
  .r-title{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;
    color:var(--violet);text-transform:uppercase;margin-bottom:9px}
  .opts{display:flex;gap:6px;margin-bottom:9px}
  .opt{flex:1;text-align:center;padding:9px 4px;border:1px solid var(--line);border-radius:7px;
    background:var(--sub);color:var(--dim);font-size:12.5px;cursor:pointer;
    font-family:'JetBrains Mono',monospace}
  .opt.sel-x2{border-color:var(--teal);color:var(--teal)}
  .opt.sel-pv{border-color:var(--gold);color:var(--gold)}
  .opt.sel-kl{border-color:var(--ember);color:var(--ember)}
  .retro textarea{margin-bottom:8px;font-size:14px}

  .r-view{margin-top:10px;padding:10px 12px;background:var(--sub);border-radius:7px;font-size:13px}
  .r-badge{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;
    text-transform:uppercase;margin-bottom:5px}
  .r-view .q{color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin-top:7px}
  .r-view .a{color:var(--text);line-height:1.4;margin-top:2px;white-space:pre-wrap}

  .sec{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.16em;
    color:var(--dim);text-transform:uppercase;margin:20px 0 10px;text-align:center}
  .empty{text-align:center;color:var(--dim);font-size:13px;padding:24px 10px;
    border:1px dashed var(--line);border-radius:10px}
  .err{position:fixed;left:50%;bottom:74px;transform:translateX(-50%);z-index:9;
    background:#2a1614;border:1px solid var(--ember);border-radius:8px;color:#e0a094;
    font-size:12px;padding:10px 14px;display:none;max-width:90%}
  .ok{border-color:var(--teal);background:#14211e;color:#9ed6c8}

  .season-head{display:flex;justify-content:space-between;align-items:baseline}
  .s-num{font-family:'Cormorant',serif;font-weight:700;font-size:22px}
  .s-day{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--blue)}
  .s-goal{margin-top:10px;padding:11px 13px;background:var(--sub);border-radius:7px;
    border-left:3px solid var(--blue);font-size:14.5px;line-height:1.45}
  .s-meta{margin-top:9px;font-size:13px;color:var(--dim);line-height:1.5;white-space:pre-wrap}
  .s-meta b{color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;
    text-transform:uppercase;letter-spacing:.08em;display:block;margin-top:8px}
  .btn-out{width:100%;background:linear-gradient(135deg,#16303f,#0d1d27);border:1px solid var(--blue);
    border-radius:8px;color:#8fc3e8;font-family:'JetBrains Mono',monospace;
    font-size:14px;font-weight:600;padding:14px;cursor:pointer;letter-spacing:.04em}
  .btn-out:active{transform:scale(.98)}
  .arch{margin-bottom:12px}

  .quest-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
  .q-week{font-family:'Cormorant',serif;font-weight:700;font-size:19px}
  .q-streak{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gold)}
  .q-status{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;margin-bottom:10px}
  .trk{background:var(--sub);border:1px solid var(--line);border-radius:8px;
    padding:10px 11px;margin-bottom:9px}
  .t-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .t-name{font-weight:600;font-size:14.5px}
  .lvl{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.08em;
    text-transform:uppercase;padding:2px 7px;border-radius:4px;border:1px solid;white-space:nowrap}
  .t-nums{display:flex;justify-content:space-between;margin-top:6px;
    font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--dim)}
  .t-nums b{color:var(--text)}
  .t-act{display:flex;gap:7px;margin-top:9px}
  .t-btn{flex:1;background:linear-gradient(135deg,#3a2f12,#241d0b);border:1px solid var(--gold);
    border-radius:7px;color:var(--gold);font-family:'JetBrains Mono',monospace;
    font-size:13px;font-weight:600;padding:10px;cursor:pointer}
  .t-btn:active{transform:scale(.98)}
  .t-sm{background:var(--card);border:1px solid var(--line);border-radius:7px;
    color:var(--dim);font-size:12px;padding:10px 11px;cursor:pointer;
    font-family:'JetBrains Mono',monospace}
  .wchips{display:flex;flex-wrap:wrap;gap:6px}
  .wchip{font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 9px;
    border-radius:6px;border:1px solid var(--line);background:var(--sub)}
  .w-ok{border-color:var(--teal);color:var(--teal)}
  .w-no{border-color:#5a3a34;color:#c98874}

  details.addf{margin-bottom:16px}
  details.addf summary{list-style:none;cursor:pointer;user-select:none;
    background:var(--card);border:1px dashed var(--line);border-radius:10px;
    padding:12px;text-align:center;font-family:'JetBrains Mono',monospace;
    font-size:12px;color:var(--dim);letter-spacing:.06em}
  details.addf summary::-webkit-details-marker{display:none}
  details.addf[open] summary{border-radius:10px 10px 0 0;border-bottom:none}
  details.addf .box{border-radius:0 0 10px 10px;margin-bottom:0}

  .ref{background:var(--card);border:1px solid var(--line);border-radius:10px;
    margin-bottom:10px;overflow:hidden}
  .ref summary{padding:13px 14px;cursor:pointer;list-style:none;display:flex;
    align-items:baseline;gap:9px;user-select:none}
  .ref summary::-webkit-details-marker{display:none}
  .ref .rt{font-family:'Cormorant',serif;font-weight:700;font-size:18px}
  .ref .rtag{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;
    text-transform:uppercase}
  .ref-body{padding:0 14px 13px;font-size:13.5px;color:var(--dim);line-height:1.55}
  .ref-body b{color:var(--text)}
  .ref-body p{margin-bottom:7px}
  .ref[open]{border-color:var(--dim)}

  .backup{position:fixed;left:0;right:0;bottom:0;z-index:8;
    background:var(--bg);opacity:.97;border-top:1px solid var(--line);
    padding:9px 14px calc(9px + env(safe-area-inset-bottom))}
  .backup-in{max-width:560px;margin:0 auto;display:flex;gap:7px;align-items:center}
  .b-info{flex:1;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);line-height:1.4;min-width:0}
  .b-btn{background:var(--sub);border:1px solid var(--line);border-radius:7px;
    color:var(--text);font-size:12px;padding:9px 10px;cursor:pointer;
    font-family:'JetBrains Mono',monospace;white-space:nowrap}
  .b-btn:active{transform:scale(.96)}
  .b-btn.gold{border-color:var(--gold);color:var(--gold)}

  /* motion */
  :root{--ease:cubic-bezier(.32,.72,0,1);--spring:cubic-bezier(.34,1.3,.5,1)}
  button,.opt,.tab,.edit,.lvl,.b-btn{transition:transform .15s var(--ease),color .2s var(--ease),border-color .2s var(--ease),background .2s var(--ease)}
  .fill{transition:width .5s var(--ease),background .45s linear}
  @keyframes cardIn{from{opacity:0;transform:translateY(8px) scale(.985)}to{opacity:1;transform:none}}
  .anim-in{animation:cardIn .32s var(--ease) both}
  @keyframes paneIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .pane.on.slide{animation:paneIn .26s var(--ease) both}
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,12px) scale(.97)}to{opacity:1;transform:translate(-50%,0)}}
  @keyframes toastOut{to{opacity:0;transform:translate(-50%,8px)}}
  .err.show{display:block;animation:toastIn .3s var(--spring) both}
  .err.hide{animation:toastOut .22s var(--ease) both}
  @keyframes statPop{0%{transform:scale(1)}45%{transform:scale(1.14)}100%{transform:scale(1)}}
  .stat .v.pop{display:inline-block;animation:statPop .3s var(--ease)}
  @keyframes onbIn{from{opacity:0;transform:scale(.96) translateY(10px)}to{opacity:1;transform:none}}
  #onb.show .onb-card{animation:onbIn .34s var(--spring) both}
  @keyframes stepIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  .step-in{animation:stepIn .24s var(--ease) both}
  @media(prefers-reduced-motion:reduce){
    *,*::before,*::after{animation:none!important;transition:none!important}
  }

  /* онбординг */
  #onb{position:fixed;inset:0;z-index:20;background:var(--scrim);
    display:none;align-items:center;justify-content:center;padding:20px;
    backdrop-filter:blur(4px)}
  #onb.show{display:flex}
  .onb-card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    max-width:420px;width:100%;padding:26px 22px 20px;text-align:center}
  .onb-gem{width:52px;height:52px;transform:rotate(45deg);margin:4px auto 18px;
    background:linear-gradient(135deg,#2a2013,#0f0c07);border:1px solid var(--gold);
    box-shadow:0 0 20px rgba(201,162,39,.3);display:flex;align-items:center;justify-content:center}
  .onb-gem span{transform:rotate(-45deg);font-family:'Cormorant',serif;font-weight:700;
    font-size:14px;color:var(--gold)}
  .onb-t{font-family:'Cormorant',serif;font-weight:700;font-size:23px;margin-bottom:10px}
  .onb-b{font-size:14px;color:var(--dim);line-height:1.6;min-height:120px;text-align:left}
  .onb-b b{color:var(--text)}
  .onb-dots{display:flex;gap:7px;justify-content:center;margin:16px 0}
  .onb-dots i{width:7px;height:7px;border-radius:50%;background:var(--line)}
  .onb-dots i.on{background:var(--gold)}
  .onb-act{display:flex;gap:8px}
  .onb-skip{background:none;border:none;color:var(--dim);font-size:12px;
    font-family:'JetBrains Mono',monospace;padding:10px;cursor:pointer}

  /* ── craft polish: глубина, свет, ритм ── */
  ::selection{background:rgba(201,162,39,.28)}
  .box,.alloc,.stat,.ref,details.addf summary{
    box-shadow:0 1px 3px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.025)}
  .btn-g,.btn30,.t-btn{box-shadow:inset 0 1px 0 rgba(255,255,255,.07),0 1px 2px rgba(0,0,0,.3)}
  .btn-out{box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 1px 2px rgba(0,0,0,.3)}
  .bar{box-shadow:inset 0 2px 5px rgba(0,0,0,.35)}
  .fill{box-shadow:inset 0 1px 0 rgba(255,255,255,.14)}
  .gem{box-shadow:0 0 18px rgba(201,162,39,.28),inset 0 1px 0 rgba(255,255,255,.1),0 2px 6px rgba(0,0,0,.4)}
  h1{text-shadow:0 0 28px rgba(201,162,39,.18)}
  .tab.on{box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
  .tabs{box-shadow:0 2px 10px rgba(0,0,0,.3)}
  input:focus,textarea:focus,select:focus{box-shadow:0 0 0 3px rgba(201,162,39,.13)}
  .lbl{letter-spacing:.13em}
  .subt{opacity:.85}
  .wchip{border-radius:999px}
  .onb-card{box-shadow:0 24px 70px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.03)}
  .r-view{box-shadow:inset 0 1px 3px rgba(0,0,0,.22)}
  .trk{box-shadow:0 1px 2px rgba(0,0,0,.2)}
  .s-goal{box-shadow:inset 0 1px 3px rgba(0,0,0,.2)}
  .err{box-shadow:0 8px 30px rgba(0,0,0,.5)}
  .btn-g:active,.btn30:active,.t-btn:active{box-shadow:inset 0 2px 4px rgba(0,0,0,.35)}

  /* ── механизм: сталь, латунь, шестерни (только визуал) ── */
  :root{
    --gearT1:#454b54;--gearT2:#111418;--gearB1:#3d434b;--gearB2:#15181d;
    --gearHub1:#5a6069;--gearHub2:#1f2227;--gearHole:#07080a;
    --riv1:#78808b;--riv2:#0c0f13;
    --steel-hi:rgba(255,255,255,.07);--steel-lo:rgba(0,0,0,.55);
  }
  /* панели тёмной стали: фаска + заклёпки по углам */
  .box,.alloc,.trk,.tabs{position:relative}
  .box,.alloc,.trk{
    box-shadow:inset 0 1px 0 var(--steel-hi),inset 0 -1px 0 var(--steel-lo),
      0 3px 10px rgba(0,0,0,.32),0 1px 2px rgba(0,0,0,.3)}
  .box::before,.alloc::before,.trk::before,.tabs::before{content:"";position:absolute;inset:0;
    border-radius:inherit;pointer-events:none;z-index:0;
    background:
      radial-gradient(circle 3px at 9px 9px,var(--riv1) 0 35%,var(--riv2) 65%,transparent 78%),
      radial-gradient(circle 3px at calc(100% - 9px) 9px,var(--riv1) 0 35%,var(--riv2) 65%,transparent 78%),
      radial-gradient(circle 3px at 9px calc(100% - 9px),var(--riv1) 0 35%,var(--riv2) 65%,transparent 78%),
      radial-gradient(circle 3px at calc(100% - 9px) calc(100% - 9px),var(--riv1) 0 35%,var(--riv2) 65%,transparent 78%);
    opacity:.8}
  /* шапка: ромб в тонкой золотой рамке, разрядка, золотое свечение подзаголовка */
  .gem{box-shadow:0 0 22px rgba(201,162,39,.35),inset 0 0 0 3px rgba(0,0,0,.55),
    inset 0 0 0 4px rgba(201,162,39,.4),0 2px 6px rgba(0,0,0,.4)}
  h1{letter-spacing:.24em;text-indent:.24em;text-shadow:0 0 28px rgba(201,162,39,.22)}
  .subt{color:var(--gold);opacity:.85;letter-spacing:.2em;
    text-shadow:0 0 12px rgba(201,162,39,.5),0 0 3px rgba(201,162,39,.4)}
  /* вкладки: металлическая планка, активная — утопленный сегмент */
  .tabs{background:linear-gradient(180deg,#21272f,#11151a);
    box-shadow:0 3px 12px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.07),inset 0 -1px 0 rgba(0,0,0,.5)}
  .tab.on{background:linear-gradient(180deg,#0d1013,#161b21);
    border-color:rgba(201,162,39,.5);
    box-shadow:inset 0 2px 6px rgba(0,0,0,.6),inset 0 -1px 0 rgba(255,255,255,.04);
    text-shadow:0 0 9px rgba(201,162,39,.45)}
  /* колбы: утопленное стекло + светящееся золото */
  .bar{border-radius:7px;background:linear-gradient(180deg,#060809,#12161b);
    box-shadow:inset 0 2px 7px rgba(0,0,0,.7),inset 0 -1px 0 rgba(255,255,255,.05),0 1px 0 rgba(255,255,255,.04)}
  /* заливка: цвет задаёт инлайн-градиент barCol (золото -> бирюза по мере прогресса),
     CSS добавляет только стекло, кончик и мягкое свечение поверх любого оттенка */
  .fill{position:relative;border-radius:0 3px 3px 0;
    box-shadow:0 0 9px rgba(255,190,100,.26),0 0 3px rgba(255,220,150,.22),
      inset 0 1px 0 rgba(255,255,255,.32),inset 0 -1px 2px rgba(0,0,0,.35)}
  .fill::before{content:"";position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(180deg,rgba(255,255,255,.36),rgba(255,255,255,.07) 34%,transparent 56%,rgba(0,0,0,.34))}
  .fill::after{content:"";position:absolute;top:0;bottom:0;right:0;width:7px;pointer-events:none;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.6))}
  .fill[data-p="0"]::after{display:none}
  .pct{color:#f2ecdc;text-shadow:0 1px 3px rgba(0,0,0,.85),0 0 2px rgba(0,0,0,.6)}
  /* латунная плита +30 и стальные кнопки */
  .btn30,.t-btn{background:linear-gradient(180deg,#4d3e18 0%,#2d240e 45%,#1b1507 100%);
    letter-spacing:.12em;text-shadow:0 0 9px rgba(255,205,95,.55);
    box-shadow:inset 0 1px 0 rgba(255,220,130,.4),inset 0 -2px 4px rgba(0,0,0,.4),
      inset 0 0 14px rgba(201,162,39,.1),0 2px 5px rgba(0,0,0,.45)}
  .btn30:active,.t-btn:active{transform:translateY(1px) scale(.985);
    box-shadow:inset 0 3px 9px rgba(0,0,0,.65),inset 0 0 12px rgba(0,0,0,.35);
    text-shadow:0 0 4px rgba(255,205,95,.35)}
  .btn-sm,.t-sm{background:linear-gradient(180deg,#242b34,#141920);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.08),inset 0 -1px 0 rgba(0,0,0,.4),0 1px 2px rgba(0,0,0,.4)}
  .btn-sm:active,.t-sm:active{box-shadow:inset 0 2px 6px rgba(0,0,0,.55)}
  /* бейджи-капсулы и kill */
  .lvl{border-radius:999px;padding:3px 9px;background:rgba(0,0,0,.28)}
  .btn-kill{background:linear-gradient(180deg,#241a19,#171010);letter-spacing:.05em}
  /* лента шестерней */
  .mech{display:flex;gap:8px;margin-top:11px;align-items:stretch}
  .mech-side{display:flex;flex-direction:column;gap:7px;width:62px;flex:none}
  .mech-side .btn-sm,.mech-side .t-sm{flex:1;padding:4px;font-size:12px}
  .gearwin{flex:1;min-width:0;height:106px;border-radius:8px;overflow:hidden;position:relative;
    pointer-events:none;border:1px solid rgba(0,0,0,.65);
    background:
      radial-gradient(95px 62px at 22% 80%,rgba(255,130,30,.3),transparent 70%),
      radial-gradient(130px 75px at 60% 26%,rgba(255,160,60,.18),transparent 70%),
      radial-gradient(80px 55px at 88% 72%,rgba(255,120,30,.24),transparent 70%),
      linear-gradient(180deg,#0b0d10,#07080a);
    box-shadow:inset 0 3px 10px rgba(0,0,0,.75),inset 0 -1px 0 rgba(255,255,255,.04)}
  .trk .gearwin{height:88px}
  .gearwin svg{position:absolute;inset:0;width:100%;height:100%;display:block}
  .gearwin::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(90deg,rgba(0,0,0,.75),transparent 14%,transparent 86%,rgba(0,0,0,.75)),
      linear-gradient(180deg,rgba(255,255,255,.05),transparent 26%,transparent 68%,rgba(0,0,0,.55)),
      radial-gradient(120% 105% at 50% 50%,transparent 55%,rgba(0,0,0,.5) 100%)}
  .gearwin .gr{transition:transform .4s cubic-bezier(.32,.72,0,1)}
  .gearstrip{position:absolute;left:50%;top:0;width:560px;height:100%;transform:translateX(-50%)}
  .gimg{position:absolute;display:block;background-size:100% 100%;background-repeat:no-repeat}
  /* без drop-shadow/blur на шестернях: конволюционные фильтры — главный источник
     фризов при дорисовке карточек во время скролла; глубину даёт свет спрайтов */
  .gback{filter:brightness(.6);opacity:.85}
  body{background-image:var(--glow),
    radial-gradient(130% 100% at 50% 8%,transparent 50%,rgba(0,0,0,.6) 100%)}
  /* шкалы как на макете: тонкие плёночные колбы с мелкой сеткой */
  .bar{height:18px;border-radius:5px;background:linear-gradient(180deg,#040507,#0e1116);
    box-shadow:inset 0 2px 6px rgba(0,0,0,.75),inset 0 -1px 0 rgba(255,255,255,.04),0 1px 0 rgba(255,255,255,.03)}
  .bar.slim{height:14px}
  .bar::after{content:"";position:absolute;inset:0;pointer-events:none;border-radius:inherit;
    background:repeating-linear-gradient(90deg,transparent 0 4px,rgba(0,0,0,.38) 4px 5px),
      repeating-linear-gradient(90deg,transparent 0 40px,rgba(255,255,255,.05) 40px 41px)}
  .pct{font-size:10px}
  /* тёмный хром: планка вкладок и стальные кнопки глубже */
  .tabs{background:linear-gradient(180deg,#171c24,#0a0d12)}
  .tab.on{background:linear-gradient(180deg,#090c10,#11151b)}
  .btn-sm,.t-sm{background:linear-gradient(180deg,#1b212a,#0f1319)}
  .btn30,.t-btn{background:linear-gradient(180deg,#3f3312 0%,#241c0a 45%,#141006 100%)}
  /* точная типографика макета: серифные названия карточек и цели */
  .a-name,.t-name{font-family:'Cormorant',serif;font-weight:700;font-size:18.5px;letter-spacing:.01em}
  .t-name{font-size:17.5px}
  .s-goal{font-family:'Cormorant',serif;font-weight:600;font-size:17px}
  .drag{font-size:15px}
  /* процент — тёмная капсула у правого края шкалы, как на макете */
  .pct{right:3px;padding:0 6px;line-height:12px;font-size:9.5px;
    background:rgba(4,6,9,.75);border:1px solid rgba(255,255,255,.08);border-radius:4px}
  /* окно механизма: глубже тьма, ярче тёплая подсветка между зубьями */
  .gearwin{height:116px;
    background:
      radial-gradient(110px 70px at 20% 82%,rgba(255,125,25,.38),transparent 68%),
      radial-gradient(150px 85px at 57% 22%,rgba(255,155,55,.22),transparent 70%),
      radial-gradient(95px 60px at 86% 76%,rgba(255,115,25,.32),transparent 68%),
      radial-gradient(60px 45px at 40% 55%,rgba(255,150,50,.2),transparent 75%),
      linear-gradient(180deg,#090b0e,#050607)}
  .trk .gearwin{height:96px}
  /* латунь чуть теплее и ярче гравировка */
  .btn30,.t-btn{border-color:#d7b04c;color:#eec45f}

  /* фон: глубокий премиальный градиент — CSS-only, без фотозадника, быстрый первый кадр */
  body{background:var(--bg);background-image:none;padding-bottom:110px}
  body::before{content:"";position:fixed;inset:0;z-index:-2;background:
      radial-gradient(1100px 520px at 50% -160px,rgba(213,162,68,.10),transparent 62%),
      radial-gradient(900px 700px at 85% 108%,rgba(96,58,20,.12),transparent 60%),
      radial-gradient(1000px 760px at -12% 112%,rgba(26,36,50,.45),transparent 62%),
      linear-gradient(180deg,#080b11 0%,#05070b 48%,#030407 100%)}
  body::after{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;background:
      radial-gradient(120% 95% at 50% 10%,transparent 55%,rgba(0,0,0,.4) 100%)}

  /* панели: тёмная сталь со стеклянной глубиной (без backdrop-filter — быстрее скролл) */
  .box,.alloc,.trk{
    background:linear-gradient(180deg,rgba(19,24,31,.97),rgba(9,12,17,.99));
    border-color:rgba(78,88,104,.5);
    box-shadow:inset 0 1px 0 rgba(255,222,145,.08),inset 0 -1px 0 rgba(0,0,0,.65),
      0 14px 36px rgba(0,0,0,.5),0 2px 7px rgba(0,0,0,.45)}
  .stat,.ref,details.addf summary{
    background:linear-gradient(180deg,rgba(19,24,31,.97),rgba(10,13,18,.99));
    border-color:rgba(78,88,104,.45)}
  .tabs{background:linear-gradient(180deg,rgba(27,33,42,.97),rgba(8,11,16,.98));
    border-color:rgba(85,95,110,.5);
    box-shadow:0 6px 22px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.08),inset 0 -1px 0 rgba(0,0,0,.55)}

  /* заголовок: гравированное золото */
  h1{background:linear-gradient(180deg,#f5e5b4 0%,#dcae4e 52%,#9c7622 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:none;
    filter:drop-shadow(0 1px 1px rgba(0,0,0,.6)) drop-shadow(0 0 16px rgba(213,162,68,.28))}
  .gem{box-shadow:0 0 26px rgba(213,162,68,.4),inset 0 0 0 3px rgba(0,0,0,.55),
    inset 0 0 0 4px rgba(213,162,68,.5),0 3px 8px rgba(0,0,0,.55)}
  .stat .v{text-shadow:0 0 14px rgba(213,162,68,.45),0 1px 2px rgba(0,0,0,.5)}

  /* шкалы: крупные секции, без мелкой сетки */
  .bar::after{background:linear-gradient(180deg,rgba(255,255,255,.07),transparent 46%)}
  .ticks i{border-right:1px solid rgba(0,0,0,.62);opacity:1}

  /* латунные и стальные кнопки */
  .btn30,.t-btn{border-color:#e0ba58;color:#f5ce6e;
    background:linear-gradient(180deg,#57431a 0%,#2f260e 48%,#171106 100%);
    box-shadow:inset 0 1px 0 rgba(255,226,140,.5),inset 0 -2px 5px rgba(0,0,0,.55),
      inset 0 0 18px rgba(213,162,68,.13),0 3px 9px rgba(0,0,0,.55)}
  .btn-sm,.t-sm{background:linear-gradient(180deg,rgba(32,39,49,.95),rgba(14,18,24,.95));
    border-color:rgba(85,95,112,.55)}
  .btn-g{box-shadow:inset 0 1px 0 rgba(255,226,140,.35),inset 0 -2px 4px rgba(0,0,0,.4),0 2px 6px rgba(0,0,0,.45)}

  /* поля ввода */
  input[type=text],textarea,select{background:rgba(7,10,14,.72);border-color:rgba(78,88,104,.5)}

  /* ═══ ЛЕНТА-ШКАЛА: сдвиг ровно на одну клетку за каждое нажатие ±30 ═══ */
  .tape{position:relative;height:38px;margin-top:8px;overflow:hidden;border-radius:7px;
    background:linear-gradient(180deg,#090c10,#0d1117);border:1px solid rgba(78,88,104,.4);
    box-shadow:inset 0 2px 6px rgba(0,0,0,.5)}
  .tape.slim{height:32px}
  .tape-strip{position:absolute;left:50%;top:0;height:100%;
    transition:transform .45s var(--ease);
    /* деления — фоновые градиенты вместо ~100 DOM-элементов на ленту:
       крупное (золото) каждые 10 клеток, среднее каждые 2, мелкое каждую;
       сдвиг фаз major/hour задаётся инлайн из tape() */
    background-image:
      linear-gradient(90deg,var(--tickM) 0 1px,transparent 1px),
      linear-gradient(90deg,var(--tickH) 0 1px,transparent 1px),
      linear-gradient(90deg,var(--tick) 0 1px,transparent 1px);
    background-repeat:repeat-x;
    background-size:130px 16px,26px 12px,13px 8px}
  .tape-strip u{position:absolute;top:0;bottom:0;left:0;text-decoration:none;
    background:linear-gradient(180deg,rgba(213,162,68,.15),rgba(213,162,68,.04));
    border-right:1px solid rgba(233,190,90,.55);
    transition:width .45s var(--ease)}
  .tape-strip b{position:absolute;top:3px;transform:translateX(-50%);
    font-family:'JetBrains Mono',monospace;font-weight:500;font-size:9.5px;
    letter-spacing:.04em;color:var(--dim);white-space:nowrap}
  .tape-ptr{position:absolute;left:50%;top:0;bottom:0;width:2px;margin-left:-1px;
    background:var(--gold);box-shadow:0 0 8px rgba(213,162,68,.7)}
  .tape-ptr::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);
    border:4px solid transparent;border-top:5px solid var(--gold)}
  .tape::after{content:"";position:absolute;inset:0;pointer-events:none;border-radius:inherit;
    background:linear-gradient(90deg,rgba(5,7,11,.85),transparent 18%,transparent 82%,rgba(5,7,11,.85))}

  /* ── производительность: мгновенное переключение темы ──
     1) карточки вне экрана не рендерятся вообще (content-visibility) —
        перекраска темы касается только видимого;
     2) окна шестерней и ленты изолированы (contain) — их растеризация
        не тянет за собой остальную страницу;
     3) html.no-trans на момент смены темы гасит все transition/animation,
        чтобы новая палитра применялась одним кадром, без волны перекрасок */
  .alloc,.trk,.ref{content-visibility:auto}
  .alloc{contain-intrinsic-size:auto 430px}
  .trk{contain-intrinsic-size:auto 330px}
  .ref{contain-intrinsic-size:auto 54px}
  .gearwin,.tape{contain:layout paint}
  html.no-trans *,html.no-trans *::before,html.no-trans *::after{
    transition:none!important;animation:none!important}
</style>

  :root{
    --bg:#05070b;--card:#0c1016;--sub:#11151c;--line:#2b333f;

  :root{
    --bg:#f0ece2; --card:#fefdf9; --sub:#f4f0e5; --line:#c6b585;
    --text:#241c0d; --dim:#6e6350; --gold:#7c5e08; --ember:#9a3a25;
    --teal:#1d6151; --violet:#52458e; --blue:#2b5a80;

let lang=localStorage.getItem('de_lang')||(((navigator.language||'').toLowerCase().startsWith('ru'))?'ru':'en');
function T(k){const v=L[lang][k]??L.ru[k];return v}

/* ================= ХРАНЕНИЕ ================= */
const KEY='de_tracker_v2';
let state={allocs:[],season:null,seasons:[],out:[]};
function load(){
  try{const r=localStorage.getItem(KEY);if(r)state={...state,...JSON.parse(r)};}catch(e){}
  if(state.season){
    if(!state.season.tracks)state.season.tracks=[];
    if(!state.season.len)state.season.len=90;
    if(state.season.outGoal===undefined)state.season.outGoal=10;
    state.season.tracks.forEach(t=>{if(!t.role)t.role='sup';if(!t.lvl)t.lvl=(t.role==='goal'?'goal':'core')});
  }
  applyTheme();applyLang();
  if(!localStorage.getItem('de_onb'))onbOpen();
}
function save(){
  try{
    localStorage.setItem(KEY,JSON.stringify(state));
    localStorage.setItem(KEY+'_ts',Date.now().toString());
    updateInfo();
  }catch(e){showErr(T('saveErr'))}
}
if(navigator.storage&&navigator.storage.persist)navigator.storage.persist();
function updateInfo(){
  const ts=localStorage.getItem(KEY+'_ts');
  const el=document.getElementById('b-info');
  if(ts){const d=new Date(+ts);const loc=lang==='ru'?'ru':'en-GB';
    el.textContent=T('saved')(d.toLocaleDateString(loc),d.toLocaleTimeString(loc,{hour:'2-digit',minute:'2-digit'}));}
  else el.textContent='';
}

/* ================= ТЕМА / ЯЗЫК ================= */
function applyTheme(){
  const th=localStorage.getItem('de_theme')||'dark';
  /* темы прекомпилированы в отдельные бандлы: переключение — это только
     enable/disable готового <style>, без матчинга [data-theme] по всему дереву;
     no-trans гасит transition на кадр смены, палитра применяется одним кадром */
  const de=document.documentElement;
  de.classList.add('no-trans');
  document.getElementById('css-dark').disabled=th!=='dark';
  document.getElementById('css-light').disabled=th!=='light';
  de.setAttribute('data-theme',th);
  document.getElementById('theme-btn').textContent=th==='dark'?'☾':'☀';
  document.querySelector('meta[name=theme-color]').content=th==='dark'?'#0d1014':'#f7f5f0';
  requestAnimationFrame(()=>requestAnimationFrame(()=>de.classList.remove('no-trans')));
}
function toggleTheme(){
  const th=localStorage.getItem('de_theme')||'dark';
  localStorage.setItem('de_theme',th==='dark'?'light':'dark');
  applyTheme();
}
function toggleLang(){
  lang=lang==='ru'?'en':'ru';
  localStorage.setItem('de_lang',lang);
  applyLang();
}
function applyLang(){
  document.documentElement.lang=lang;
  document.getElementById('hdr-sub').textContent=T('sub');
  document.getElementById('tab-alloc').textContent=T('tabA');
  document.getElementById('tab-season').textContent=T('tabS');
  document.getElementById('tab-ref').textContent=T('tabM');
  document.getElementById('sl-active').textContent=T('stA');
  document.getElementById('sl-hours').textContent=T('stH');
  document.getElementById('sl-de').textContent=T('stD');
  document.getElementById('in-name').placeholder=T('namePh');
  document.getElementById('btn-open').textContent=T('open');
  document.getElementById('calc').textContent=T('calc0');
  const sel=document.getElementById('in-level');
  sel.innerHTML='<option value="core">'+T('lvCore')+'</option><option value="exp">'+T('lvExp')+'</option><option value="body">'+T('lvBody')+'</option>';
  document.getElementById('lang-btn').textContent=lang==='ru'?'EN':'RU';
  document.getElementById('exp-btn').textContent=T('exp');
  updImpBtn();
  document.getElementById('onb-skip').textContent=T('skip');
  refRender();updateInfo();render();
  if(document.getElementById('onb').classList.contains('show'))onbShow();
}

/* ================= ОНБОРДИНГ ================= */
let onbI=0;
function onbOpen(){onbI=0;document.getElementById('onb').classList.add('show');onbShow()}
function onbShow(){
  const cards=T('onb');
  const c=cards[onbI];
  const tt=document.getElementById('onb-t'),bb=document.getElementById('onb-b');
  tt.textContent=c.t;bb.innerHTML=c.b;
  [tt,bb].forEach(el=>{el.classList.remove('step-in');void el.offsetWidth;el.classList.add('step-in')});
  document.getElementById('onb-dots').innerHTML=cards.map((_,i)=>'<i class="'+(i===onbI?'on':'')+'"></i>').join('');
  document.getElementById('onb-next').textContent=onbI<cards.length-1?T('next'):T('startO');
}
function onbNext(){
  const cards=T('onb');
  if(onbI<cards.length-1){onbI++;onbShow()}
  else onbClose();
}
function onbClose(){
  document.getElementById('onb').classList.remove('show');
  localStorage.setItem('de_onb','1');
}

/* ================= ЭКСПОРТ / ИМПОРТ ================= */
async function exportData(){
  const name='TICAP_backup_'+new Date().toISOString().slice(0,10)+'.json';
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const file=new File([blob],name,{type:'application/json'});
  if(navigator.canShare&&navigator.canShare({files:[file]})){
    try{await navigator.share({files:[file],title:'TICAP backup'});showOk(T('shareOk'));return}
    catch(e){if(e.name==='AbortError')return}
  }
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download=name;a.click();
  showOk(T('dlOk'));
}
function askImport(){
  if(armed['imp']){delete armed['imp'];updImpBtn();document.getElementById('imp').click();return}
  armed['imp']=1;updImpBtn();
  setTimeout(()=>{if(armed['imp']){delete armed['imp'];updImpBtn()}},3200);
}

let actx=null,lastTap={x:200,y:200};
document.addEventListener('pointerdown',e=>{
  lastTap={x:e.clientX,y:e.clientY};
  /* прогрев звука: контекст создаётся/возобновляется уже на pointerdown,
     к моменту click тик воспроизводится без задержки запуска */
  if(localStorage.getItem('de_mute')!=='1'){
    try{audioInit();if(actx&&actx.state==='suspended')actx.resume()}catch(_){}
  }
},true);
let verb=null,wetG=null,dryG=null;
function audioInit(){
  if(actx)return;
  actx=new (window.AudioContext||window.webkitAudioContext)();
  dryG=actx.createGain();dryG.gain.value=0.85;dryG.connect(actx.destination);
  /* лёгкий реверб: свёртка с затухающим шумом ~1.4 c */
  wetG=actx.createGain();wetG.gain.value=0.32;
  verb=actx.createConvolver();
  const len=actx.sampleRate*1.4,buf=actx.createBuffer(2,len,actx.sampleRate);
  for(let c=0;c<2;c++){const d=buf.getChannelData(c);
    for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.6);}
  verb.buffer=buf;verb.connect(actx.destination);wetG.connect(verb);
}
function bus(){const g=actx.createGain();g.connect(dryG);g.connect(wetG);return g}
function piano(f,st,dur,vol){
  /* пианино: частичные тоны с быстрой атакой, двухступенчатым затуханием и темнеющим фильтром */
  const out=bus();
  const lp=actx.createBiquadFilter();lp.type='lowpass';
  lp.frequency.setValueAtTime(4200,st);
  lp.frequency.exponentialRampToValueAtTime(900,st+dur);
  lp.connect(out);
  [[1,0.5,'triangle'],[0.9982,0.34,'triangle'],[1.0018,0.34,'triangle'],
   [2,0.3,'sine'],[3,0.1,'sine'],[4.02,0.04,'sine']].forEach(([m,r,tp])=>{
    const o=actx.createOscillator(),g=actx.createGain();
    o.type=tp;o.frequency.value=f*m;
    g.gain.setValueAtTime(0.0001,st);
    g.gain.linearRampToValueAtTime(vol*r,st+0.004);
    g.gain.exponentialRampToValueAtTime(vol*r*0.25,st+0.12);
    g.gain.exponentialRampToValueAtTime(0.0001,st+dur);
    o.connect(g);g.connect(lp);o.start(st);o.stop(st+dur+0.1);
  });
}
function gtr(f,st,dur,vol){
  /* нейлоновая гитара: острая атака, быстро темнеющий фильтр */
  const out=bus();
  const lp=actx.createBiquadFilter();lp.type='lowpass';
  lp.frequency.setValueAtTime(2600,st);
  lp.frequency.exponentialRampToValueAtTime(620,st+dur*0.7);
  lp.connect(out);
  [[1,'sawtooth',0.32],[1.0012,'triangle',0.5],[2,'sine',0.1]].forEach(([m,tp,r])=>{
    const o=actx.createOscillator(),g=actx.createGain();
    o.type=tp;o.frequency.value=f*m;
    g.gain.setValueAtTime(0.0001,st);
    g.gain.linearRampToValueAtTime(vol*r,st+0.003);
    g.gain.exponentialRampToValueAtTime(vol*r*0.16,st+0.09);
    g.gain.exponentialRampToValueAtTime(0.0001,st+dur);
    o.connect(g);g.connect(lp);o.start(st);o.stop(st+dur+0.05);
  });
}
function voice(f,st,dur,vol){
  /* «Еее!»: пила-источник через форманты гласной Е, глиссандо вверх */
  const out=bus();
  const flt=[[450,1,4],[2100,0.42,10],[2900,0.16,12]].map(([fc,g,q])=>{
    const bp=actx.createBiquadFilter();bp.type='bandpass';
    bp.frequency.value=fc;bp.Q.value=q;
    const gg=actx.createGain();gg.gain.value=g;
    bp.connect(gg);gg.connect(out);return bp;
  });
  [0,-8,9].forEach(det=>{
    const o=actx.createOscillator(),g=actx.createGain();
    o.type='sawtooth';
    const f0=f*Math.pow(2,det/1200);
    o.frequency.setValueAtTime(f0*0.8,st);
    o.frequency.exponentialRampToValueAtTime(f0,st+0.09);
    g.gain.setValueAtTime(0.0001,st);
    g.gain.linearRampToValueAtTime(vol,st+0.035);
    g.gain.setValueAtTime(vol,st+dur*0.55);
    g.gain.exponentialRampToValueAtTime(0.0001,st+dur);
    o.connect(g);flt.forEach(bp=>g.connect(bp));
    o.start(st);o.stop(st+dur+0.05);
  });
}
let tickAlt=false,tickNB=null;
function clockTick(st,alt){
  /* механический тик часов: щелчок анкера (узкополосный шум) +
     короткий звон оси + глухой отклик деревянного корпуса; тик/так чередуются */
  const out=actx.createGain();out.gain.value=1;out.connect(dryG);
  /* шумовой буфер один раз, а не на каждое нажатие */
  if(!tickNB){
    const nl=Math.floor(actx.sampleRate*0.03);
    tickNB=actx.createBuffer(1,nl,actx.sampleRate);
    const nd=tickNB.getChannelData(0);
    for(let i=0;i<nl;i++)nd[i]=(Math.random()*2-1)*Math.pow(1-i/nl,3.4);
  }
  const src=actx.createBufferSource();src.buffer=tickNB;
  const bp=actx.createBiquadFilter();bp.type='bandpass';
  bp.frequency.value=alt?2100:2700;bp.Q.value=6.5;
  const ng=actx.createGain();ng.gain.setValueAtTime(0.55,st);
  src.connect(bp);bp.connect(ng);ng.connect(out);src.start(st);
  const o=actx.createOscillator(),g=actx.createGain();
  o.type='sine';o.frequency.value=alt?860:1120;
  g.gain.setValueAtTime(0.0001,st);
  g.gain.linearRampToValueAtTime(0.1,st+0.002);
  g.gain.exponentialRampToValueAtTime(0.0001,st+0.05);
  o.connect(g);g.connect(out);o.start(st);o.stop(st+0.08);
  const o2=actx.createOscillator(),g2=actx.createGain();
  o2.type='triangle';o2.frequency.setValueAtTime(alt?150:185,st);
  o2.frequency.exponentialRampToValueAtTime(70,st+0.04);
  g2.gain.setValueAtTime(0.0001,st);
  g2.gain.linearRampToValueAtTime(0.22,st+0.003);
  g2.gain.exponentialRampToValueAtTime(0.0001,st+0.07);
  o2.connect(g2);g2.connect(out);o2.start(st);o2.stop(st+0.1);
}
function snd(type,pct){
  if(localStorage.getItem('de_mute')==='1')return;
  try{
    audioInit();
    if(actx.state==='suspended')actx.resume();
    const t=actx.currentTime;
    if(type==='full'){
      /* полная каденция IV→V→I: разбег фа-мажор → соль-мажор → широкий Cadd9 с искрами */
      [174.61,220,261.63].forEach(f=>piano(f,t,0.3,0.045));              /* F */
      [196,246.94,293.66].forEach(f=>piano(f,t+0.15,0.32,0.052));        /* G */
      [261.63,329.63,392,523.25,659.25].forEach((f,i)=>piano(f,t+0.31+i*0.05,0.9,0.075)); /* арпеджио */
      [130.81,196,261.63,329.63,392,523.25,587.33,659.25].forEach(f=>piano(f,t+0.58,2.4,0.052)); /* Cadd9 в 3 октавы */
      piano(783.99,t+0.85,1.3,0.04);piano(1046.5,t+1.0,1.4,0.042);piano(1318.5,t+1.15,1.5,0.032); /* искры G6-C6-E6 */
    }else if(type==='kill'){
      piano(220,t,1.0,0.075);piano(174.61,t+0.14,1.3,0.065);
    }else if(type==='out'){
      piano(392,t,0.8,0.085);piano(523.25,t+0.09,1.0,0.08);
    }else{
      /* движение шкалы (+30 / −30): тик часов, тик и так чередуются */
      tickAlt=!tickAlt;
      clockTick(t,tickAlt);
    }
  }catch(e){}
}

function celebrate(){
  const cv=document.createElement('canvas');
  cv.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:99';
  cv.width=innerWidth;cv.height=innerHeight;
  document.body.appendChild(cv);
  const ctx=cv.getContext('2d');
  const cols=['#c9a227','#ffe9a8','#3e8e7e','#c0533e','#e6e0d2'];
  const P=[];
  for(let i=0;i<34;i++){
    const a=Math.random()*Math.PI*2,v=3+Math.random()*4.5;
    P.push({x:lastTap.x,y:lastTap.y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-3.2,
      s:2.5+Math.random()*3,c:cols[i%cols.length],r:Math.random()*Math.PI,
      vr:(Math.random()-.5)*.3,life:1});
  }
  (function fr(){
    ctx.clearRect(0,0,cv.width,cv.height);
    let alive=false;
    for(const p of P){
      p.x+=p.vx;p.y+=p.vy;p.vy+=0.16;p.r+=p.vr;p.life-=0.016;
      if(p.life>0){alive=true;
        ctx.save();ctx.globalAlpha=Math.max(0,p.life);
        ctx.translate(p.x,p.y);ctx.rotate(p.r);
        ctx.fillStyle=p.c;ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*1.6);
        ctx.restore();}
    }
    if(alive)requestAnimationFrame(fr);else cv.remove();
  })();
}

/* ================= DRAG & DROP ================= */
let drag=null;
function blockScroll(e){if(drag)e.preventDefault()}
function startDrag(e,el,type){
  e.preventDefault();
  try{e.target.setPointerCapture(e.pointerId)}catch(_){}
  drag={el,type,startY:e.clientY,lastY:e.clientY,gap:type==='blk'?14:(type==='trk'?9:13)};
  el.classList.add('dragging');
  document.body.style.overflow='hidden';
  drag.timer=setInterval(()=>{if(drag)applyDrag(drag.lastY,true)},16);
  document.addEventListener('touchmove',blockScroll,{passive:false});
  document.addEventListener('pointermove',dragMove,{passive:false});
  document.addEventListener('pointerup',dragEnd);
  document.addEventListener('pointercancel',dragEnd);
}
function dragStart(e,id){const el=e.target.closest('.alloc');if(el)startDrag(e,el,'card')}
function blkStart(e){const el=e.target.closest('.blk');if(el)startDrag(e,el,'blk')}
function trkStart(e){const el=e.target.closest('.trk');if(el)startDrag(e,el,'trk')}
function dragMove(e){if(!drag)return;e.preventDefault();drag.lastY=e.clientY;applyDrag(e.clientY,false)}
function applyDrag(y,fromTimer){
  const M=80;let sv=0;
  if(y<M)sv=-11;else if(y>innerHeight-M)sv=11;
  if(sv){window.scrollBy(0,sv);drag.startY-=sv;}
  else if(fromTimer)return;
  drag.el.style.transform='translateY('+(y-drag.startY)+'px)';
  const parent=drag.el.parentElement;
  const cls=drag.type==='blk'?'blk':(drag.type==='trk'?'trk':'alloc');
  const dr=drag.el.getBoundingClientRect();
  const dMid=dr.top+dr.height/2;
  const kids=[...parent.children].filter(x=>x.classList&&x.classList.contains(cls));
  const di=kids.indexOf(drag.el);
  for(const s of kids){
    if(s===drag.el)continue;
    const r=s.getBoundingClientRect();
    const mid=r.top+r.height/2;
    const si=kids.indexOf(s);
    if(si<di&&dMid<mid){
      parent.insertBefore(drag.el,s);
      drag.startY-=r.height+drag.gap;
      drag.el.style.transform='translateY('+(y-drag.startY)+'px)';break;
    }
    if(si>di&&dMid>mid){
      parent.insertBefore(drag.el,s.nextSibling);
      drag.startY+=r.height+drag.gap;
      drag.el.style.transform='translateY('+(y-drag.startY)+'px)';break;
    }
  }
}
function dragEnd(){
  if(!drag)return;
  clearInterval(drag.timer);
  const parent=drag.el.parentElement;
  const type=drag.type;
  drag.el.classList.remove('dragging');
  drag.el.style.transform='';
  document.body.style.overflow='';
  document.removeEventListener('touchmove',blockScroll);
  document.removeEventListener('pointermove',dragMove);
  document.removeEventListener('pointerup',dragEnd);
  document.removeEventListener('pointercancel',dragEnd);
  if(type==='card'){
    const lvl=parent.dataset.level;
    const ids=[...parent.querySelectorAll('.alloc')].map(x=>x.dataset.id);
    const slots=state.allocs.map((a,i)=>(!a.retro&&(a.level||'core')===lvl)?i:-1).filter(i=>i>=0);
    const items=ids.map(id=>state.allocs.find(a=>a.id===id)).filter(Boolean);
    if(items.length===slots.length)slots.forEach((si,k)=>state.allocs[si]=items[k]);
  }else if(type==='trk'){
    const s=state.season;
    if(s){
      const ids=[...document.querySelectorAll('#quest-blk .trk')].map(x=>x.dataset.tid);
      const map={};s.tracks.forEach(t=>map[t.id]=t);
      const nt=ids.map(id=>map[id]).filter(Boolean);
      if(nt.length===s.tracks.length)s.tracks=nt;
    }
  }else{
    if(parent.id==='quest-blk'&&state.season){
      state.season.grpOrder=[...parent.querySelectorAll(':scope > .blk')].map(x=>x.dataset.lvl);
    }else{
      state.lvlOrder=[...document.querySelectorAll('#active-list .blk')].map(x=>x.dataset.level);
    }
  }
  drag=null;save();render();
}

function tick(id,delta){
  const a=state.allocs.find(x=>x.id===id);if(!a)return;
  const prev=a.done;
  a.done=Math.max(0,Math.min(a.total,a.done+delta));
  if(a.done===prev)return; /* граница шкалы — ничего не изменилось */
  if(delta>0){
    spinGears('a'+id);
    if(a.done>=a.total){snd('full');celebrate();}
    else snd('tick',Math.round(a.done/a.total*100));
  }
  else{
    spinGears('a'+id,-1);
    snd('tick',Math.round(a.done/a.total*100));
  }
  save();
  /* быстрый путь: карточка осталась «в работе» — патчим только её,
     тяжёлая полная перерисовка уходит из кадра нажатия */
  if(prev<a.total&&a.done<a.total&&!a.killed&&!a.retro
    &&patchCard('.alloc[data-id="'+id+'"]',card(a))){
    updStats();renderSoon();return;
  }
  render();
}

/* ── механизм: лента фотореалистичных шестерней (декор, pointer-events:none) ──
   спрайты .gs1/.gs2/.gs3 встроены base64 в CSS; [класс, диаметр, left, top, задний план] */
const GEAR_SPR=[
  ['gs2',72,74,78,1],['gs1',104,158,-36,1],['gs3',68,288,78,1],['gs2',100,380,-38,1],['gs1',60,515,14,1],
  ['gs1',120,0,12,0],['gs2',84,114,12,0],['gs3',132,192,18,0],['gs2',96,316,4,0],['gs1',116,404,26,0]];
function gearRow(gid){
  return `<div class="gearwin" data-gid="${gid}" aria-hidden="true"><div class="gearstrip">`
    +GEAR_SPR.map(s=>`<i class="gr gimg ${s[0]}${s[4]?' gback':''}" style="width:${s[1]}px;height:${s[1]}px;left:${s[2]}px;top:${s[3]}px"></i>`).join('')
    +`</div></div>`;
}
const gearSteps={},lastGear={};
function spinGears(gid,dir=1){gearSteps[gid]=(gearSteps[gid]||0)+dir}

/* ── лента-шкала: клетка = 30 мин; каждое нажатие сдвигает ленту ровно на клетку.
   Указатель зафиксирован в центре, рисуется только окно ±W клеток вокруг позиции —
   поэтому сдвиг виден одинаково и на коротких, и на очень длинных дистанциях.
   Деления рисуются фоновыми градиентами (см. .tape-strip), DOM — только подписи часов ── */
const TAPE_CW=13;
function tape(k,done,total,slim){
  const W=48;
  const s=Math.max(0,done-W),e=Math.min(total,done+W);
  let labels='';
  for(let i=Math.ceil(s/10)*10;i<=e;i+=10)
    labels+=`<b style="left:${(i-s)*TAPE_CW}px">${fmt(i*0.5)}${T('h')}</b>`;
  /* фазы фоновых слоёв: major выравнивается на клетки кратные 10, hour — кратные 2 */
  const mj=((10-s%10)%10)*TAPE_CW,hr=((2-s%2)%2)*TAPE_CW,py='calc(100% - 6px)';
  return `<div class="tape${slim?' slim':''}" data-tk="${k}" data-done="${done}" data-start="${s}">`
    +`<div class="tape-strip" style="width:${(e-s)*TAPE_CW}px;transform:translateX(${-(done-s)*TAPE_CW}px);`
    +`background-position:${mj}px ${py},${hr}px ${py},0 ${py}">`
    +`<u style="width:${(done-s)*TAPE_CW}px"></u>${labels}</div>`
    +`<span class="tape-ptr"></span></div>`;
}

    <div class="bar"><div class="fill" data-k="a${a.id}" data-p="${pct}" style="width:${pct}%${!a.retro?`;background:linear-gradient(90deg,${bc[0]},${bc[1]})`:''}"></div>${ticks}
      <div class="pct">${pct}%</div></div>

  </div>`;

const LVL=()=>({body:{t:T('bBody'),c:'var(--ember)'},core:{t:T('bCore'),c:'var(--gold)'},exp:{t:T('bExp'),c:'var(--violet)'}});
function pauseIntersects(a,b){
  const s=state.season;if(!s)return false;
  const list=[...(s.pauses||[]),...(s.pause?[{from:s.pause.ts,to:s.pause.until}]:[])];
  return list.some(p=>p.from<b&&p.to>a);
}
function ensureWeek(){
  const s=state.season;if(!s)return;
  if(s.pause&&Date.now()>s.pause.until){
    s.pauses=s.pauses||[];
    s.pauses.push({from:s.pause.ts,to:s.pause.until,why:s.pause.why,note:s.pause.note||'',until:s.pause.until});
    s.pause=null;
  }
  if(!s.wk)s.wk={start:s.start,done:{},notes:{}};
  if(s.wkMode!=='rel'){ /* миграция: недели идут от даты старта, не от пн */
    const k=Math.max(0,Math.floor((Date.now()-s.start)/604800000));
    s.wk.start=s.start+k*604800000;
    s.wkMode='rel';
  }
  let g=0;
  while(Date.now()>=s.wk.start+7*86400000&&g<520){
    const end=s.wk.start+7*86400000;
    const out=state.out.filter(t=>t>=s.wk.start&&t<end).length;
    let ok=(s.tracks||[]).length>0;let hrs=0;
    for(const tr of (s.tracks||[])){
      const d=s.wk.done[tr.id]||0;hrs+=d*0.5;
      if(d<Math.round(tr.norm*2))ok=false;
    }
    if(out<(s.outGoal||0))ok=false;
    const paused=pauseIntersects(s.wk.start,end);
    if(!s.weeks)s.weeks=[];
    s.weeks.push({start:s.wk.start,ok:paused?false:ok,paused,hrs,out,notes:s.wk.notes||{}});
    s.wk={start:end,done:{},notes:{}};g++;
  }
}
function pwName(k){return ({ill:T('pw1'),fm:T('pw2'),vac:T('pw3')})[k]||k}
function pauseCount(){const s=state.season;return s?((s.pauses||[]).length+(s.pause?1:0)):0}
function openPause(){
  const s=state.season;if(!s)return;
  const lp=(s.pauses||[])[(s.pauses||[]).length-1];
  if(!s.pause&&lp&&lp.until&&Date.now()<lp.until){
    /* возврат был ошибочным — возобновляем ту же паузу, лимит не тратится */
    s.pauses.pop();
    s.pause={why:lp.why,until:lp.until,note:lp.note||'',ts:Date.now()};
    save();render();showOk(T('pauseRes'));return;
  }
  if(pauseCount()>=2){showErr(T('pauseLim'));return}
  window._pauseForm=true;render();
}
function startPause(){
  const s=state.season;if(!s)return;

  if(why==='vac'&&(s.pauses||[]).some(p=>p.why==='vac')){showErr(T('vacLim'));return}

function streak(){

  let n=0;
  for(let i=s.weeks.length-1;i>=0;i--){

function goAlloc(){const t=document.querySelector('.tab[data-p="p-alloc"]');if(t)swTab(t);window.scrollTo({top:0,behavior:'smooth'})}
function trackTick(tid,delta){
  const s=state.season;if(!s)return;
  ensureWeek();
  const cur=s.wk.done[tid]||0;
  const tr=s.tracks.find(t=>t.id===tid);
  if(s.pause&&delta>0)return; /* пауза: треки заморожены */
  if(delta>0&&tr){
    const need=Math.round(tr.norm*2);
    const betA=tr.betId?state.allocs.find(x=>x.id===tr.betId&&!x.retro):null;
    const canOver=betA&&!betA.killed&&betA.done<betA.total;
    if(need>0&&cur>=need&&!canOver)return; /* норма закрыта, копить некуда */
  }
  s.wk.done[tid]=Math.max(0,cur+delta);
  let allocDone=false;
  if(tr&&tr.betId){
    const a=state.allocs.find(x=>x.id===tr.betId&&!x.retro);
    if(a&&!a.killed){
      const pa=a.done;
      a.done=Math.max(0,Math.min(a.total,a.done+delta));
      if(delta>0&&pa<a.total&&a.done>=a.total)allocDone=true;
    }
  }
  if(delta>0&&s.wk.done[tid]>cur){
    spinGears('t'+tid);
    const need=tr?Math.round(tr.norm*2):0;
    if(allocDone){snd('full');celebrate();showOk(T('allocFull'));}
    else if(need>0&&cur<need&&s.wk.done[tid]>=need){snd('full');celebrate();}
    else snd('tick',need>0?Math.min(100,Math.round(s.wk.done[tid]/need*100)):0);
  }
  else if(delta<0&&s.wk.done[tid]<cur){
    spinGears('t'+tid,-1);
    const need=tr?Math.round(tr.norm*2):0;
    snd('tick',need>0?Math.min(100,Math.round(s.wk.done[tid]/need*100)):0);
  }
  save();
  /* быстрый путь: статус недельной нормы не пересёк границу и привязанная
     аллокация не закрылась — патчим только карточку трека (и карточку
     привязанной аллокации), без полной перерисовки обеих панелей */
  const needN=tr?Math.round(tr.norm*2):0;
  const wasDone=needN>0&&cur>=needN,nowDone=needN>0&&(s.wk.done[tid]||0)>=needN;
  if(tr&&!allocDone&&wasDone===nowDone&&s.wk.done[tid]!==cur
    &&patchCard('.trk[data-tid="'+tid+'"]',trackCard(tr))){
    if(tr.betId){
      const a=state.allocs.find(x=>x.id===tr.betId&&!x.retro);
      if(a&&!a.killed)patchCard('.alloc[data-id="'+a.id+'"]',card(a));
    }
    updStats();renderSoon();return;
  }
  render();
}

function trackCard(tr){
  const s=state.season;
  const need=Math.round(tr.norm*2);
  const d=s.wk.done[tr.id]||0;
  const pct=Math.min(100,Math.round(d/need*100));
  const TL={goal:{t:T('rGoal'),c:'var(--blue)'},core:{t:T('tgCore'),c:'var(--gold)'},
    exp:{t:T('tgExp'),c:'var(--violet)'},body:{t:T('tgBody'),c:'var(--ember)'}};
  const lv=TL[tr.lvl||((tr.role||'sup')==='goal'?'goal':'core')]||TL.core;
  const tb=barCol(pct);
  const bet=tr.betId?state.allocs.find(x=>x.id===tr.betId&&!x.retro):null;
  let betLine='';
  const betNeeds=bet&&(bet.done>=bet.total||bet.killed);
  if(bet){
    if(betNeeds){
      betLine=`<div class="t-nums" style="margin-top:4px;color:var(--violet)"><span><b style="color:var(--violet)">${T('retroWait')}</b></span></div>`
        +retroForm(bet,'-s');
    }else{
      const rem=bet.total-bet.done;
      const wks=need>0?Math.ceil(rem/need):0;
      betLine=`<div class="t-nums" style="margin-top:4px"><span>${T('tBind')} <b>${esc(bet.name)}</b></span><span>${bet.done}/${bet.total} ${T('cp')} · ~${wks} ${T('tWks')}</span></div>`;
    }
  }
  const betActive=bet&&!bet.killed&&bet.done<bet.total;
  const closedWeek=need>0&&d>=need&&!betActive;
  const done=need>0&&d>=need;
  const note=(s.wk.notes||{})[tr.id]||'';
  return `<div class="trk" data-tid="${tr.id}" style="border-left:3px solid ${done?'var(--teal)':lv.c}">
    <div class="t-top">
      <div class="t-name">${done?'':`<span class="drag" style="font-size:15px;padding:6px 10px 6px 0" ontouchstart="event.preventDefault()" onpointerdown="trkStart(event)">≡</span>`}${esc(tr.name)} <span class="edit" onclick="editTrack('${tr.id}')">✎</span></div>
      <div style="display:flex;gap:6px;align-items:center">
        <span class="lvl" style="color:${lv.c};border-color:${lv.c};cursor:pointer" onclick="cycleTrkLvl('${tr.id}')">${lv.t}</span>
        <span class="edit" style="${armed['tk'+tr.id]?'color:var(--ember);opacity:1':''}" onclick="delTrack('${tr.id}')">${armed['tk'+tr.id]?T('delQ'):'✕'}</span>
      </div>
    </div>
    <div class="bar slim"><div class="fill" data-k="t${tr.id}" data-p="${pct}" style="width:${pct}%;background:linear-gradient(90deg,${tb[0]},${tb[1]})"></div>
      <div class="pct">${pct}%</div></div>
    ${tape('t'+tr.id,d,Math.max(need,d),true)}
    <div class="t-nums"><span><b>${fmt(d*0.5)}</b> / ${fmt(tr.norm)} ${T('h')} ${T('tWeek')}${d>=need?' <b style="color:var(--teal)">✓</b>':''}</span>
      <span><b>${d}</b>/${need} ${T('cp')}</span></div>
    ${betLine}
    ${done?`<input type="text" style="margin-top:9px;font-size:13px;background:var(--card)" placeholder="${T('wkRetroPh')}" value="${esc(note)}" onchange="wkNote('${tr.id}',this.value)">`:''}
    ${s.pause?`<div class="t-act"><div style="flex:1;text-align:center;padding:10px;border:1px dashed var(--line);border-radius:7px;color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.04em">${T('pausePlate')}</div></div>`:closedWeek?`<div class="t-act">
      <div style="flex:1;text-align:center;padding:10px;border:1px dashed var(--teal);border-radius:7px;color:var(--teal);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.04em">${T('normClosed')}</div>
      <button class="t-sm" onclick="trackTick('${tr.id}',-1)">−30</button>
    </div>`:`<div class="mech">${gearRow('t'+tr.id)}
      <div class="mech-side"><button class="t-sm" style="flex:1" onclick="trackTick('${tr.id}',-1)">−30</button></div>
    </div>
    <div class="t-act">
      <button class="t-btn" onclick="trackTick('${tr.id}',1)">${T('min30')}</button>
    </div>`}
  </div>`;
}
function seasonPane(){
  const el=document.getElementById('p-season');
  const s=state.season;
  let html='';
  if(!s){
    html+=`<details class="addf"><summary>${T('cheatSum')}</summary>
    <div class="box">${T('cheat')}</div></details>`;
    html+=`<div class="box">
      <div class="lbl">${T('snNum')}</div>
      <input type="text" id="sn-num" value="${state.seasons.length+1}">
      <div class="lbl">${T('snGoal')}</div>
      <textarea id="sn-goal" placeholder="${T('snGoalPh')}"></textarea>
      <div class="lbl">${T('snLen')}</div>
      <select id="sn-len">
        <option value="30">${T('len30')}</option>
        <option value="60">${T('len60')}</option>
        <option value="90" selected>${T('len90')}</option>
      </select>
      <div class="lbl">${T('snOut')}</div>
      <input type="text" id="sn-out" inputmode="numeric" placeholder="10">
      <div class="lbl">${T('snKill')}</div>
      <textarea id="sn-kill" placeholder="${T('snKillPh')}"></textarea>
      <div class="hint">${T('snHint')}</div>
      <button class="btn-g" onclick="startSeason()">${T('start')}</button>
    </div>`;
  }else{
    ensureWeek();
    const len=s.len||90;
    const day=Math.min(len,Math.floor((Date.now()-s.start)/86400000)+1);
    const pct=Math.round(day/len*100);
    const ws=s.wk.start;
    const outWeek=state.out.filter(t=>t>=ws).length;
    const outSeason=state.out.filter(t=>t>=s.start).length;
    const weekNum=(s.weeks||[]).length+1;
    const st=streak();
    let tracksOk=(s.tracks||[]).length>0;
    for(const tr of (s.tracks||[])){
      if((s.wk.done[tr.id]||0)<Math.round(tr.norm*2)){tracksOk=false;break}
    }
    const outOk=outWeek>=(s.outGoal||0);
    const questOk=tracksOk&&outOk;
    if(window._editSeason){
      html+=`<div class="box">
        <div class="lbl">${T('snNum')}</div>
        <input type="text" id="se-num" value="${esc(s.num)}">
        <div class="lbl">${T('snGoal')}</div>
        <textarea id="se-goal">${esc(s.goal)}</textarea>
        <div class="lbl">${T('snOut')}</div>
        <input type="text" id="se-out" inputmode="numeric" value="${s.outGoal||0}">
        <div class="lbl">${T('snKill')}</div>
        <textarea id="se-kill">${esc(s.kill||'')}</textarea>
        <div class="a-actions"><button class="btn30" onclick="saveSeasonEdit()">${T('saveEdits')}</button>
          <button class="btn-sm" onclick="window._editSeason=false;render()">${T('cancel')}</button>
          <button class="btn-sm btn-kill" onclick="cancelSeason()">${armed['cs']?T('cancelSArm'):T('cancelS')}</button></div>
      </div>`;
    }else{
      html+=`<div class="box">
        <div class="season-head"><span class="s-num">${T('season')}${esc(s.num)}</span>
          <span class="s-day">${T('day')(day,len)}</span></div>
        <div class="bar" style="margin-top:10px"><div class="fill" style="width:${pct}%;background:linear-gradient(90deg,#274b63,var(--blue))"></div>
          <div class="pct">${pct}%</div></div>
        <div class="s-goal">${esc(s.goal)}</div>
        ${s.kill?`<div class="s-meta"><b>${T('killLbl')}</b>${esc(s.kill)}</div>`:''}
        <div class="a-actions">
          <button class="btn-sm" onclick="editSeason()">${T('edit')}</button>
          ${!s.pause?`<button class="btn-sm" onclick="openPause()">${T('pauseBtn')}</button>`:''}
          <button class="btn-sm btn-kill" onclick="seasonKill()">${T('killS')}</button>
        </div>
      </div>`;
      if(s.pause){
        html+=`<div class="box" style="border-color:var(--line)">
          <div class="r-title" style="color:var(--dim)">${T('pauseOn')(dstr(s.pause.until))} · ${pwName(s.pause.why)}</div>
          ${s.pause.note?`<div class="s-meta" style="margin-top:0">${esc(s.pause.note)}</div>`:''}
          <div class="a-actions"><button class="btn-sm" style="flex:1${armed['pz']?';border-color:var(--ember);color:var(--ember)':''}" onclick="endPause()">${armed['pz']?T('backArm'):T('pauseBack')}</button></div>
        </div>`;
      }
      if(window._pauseForm&&!s.pause){
        const maxD=new Date(Date.now()+14*86400000).toISOString().slice(0,10);
        const minD=new Date(Date.now()+86400000).toISOString().slice(0,10);
        html+=`<div class="box">
          <div class="r-title" style="color:var(--dim)">${T('pauseT')}</div>
          <div class="lbl">${T('pauseWhy')}</div>
          <select id="pz-why">
            <option value="ill">${T('pw1')}</option><option value="fm">${T('pw2')}</option><option value="vac">${T('pw3')}</option>
          </select>
          <div class="lbl">${T('pauseUntil')}</div>
          <input type="date" id="pz-until" min="${minD}" max="${maxD}"
            style="width:100%;background:var(--sub);border:1px solid var(--line);border-radius:7px;color:var(--text);padding:10px 12px;font-family:'Inter',sans-serif;font-size:15px">
          <div class="lbl">${T('pauseNote')}</div>
          <input type="text" id="pz-note" maxlength="80">
          <div class="a-actions">
            <button class="btn30" onclick="startPause()">${T('pauseGo')}</button>
            <button class="btn-sm" onclick="window._pauseForm=false;render()">${T('cancel')}</button>
          </div>
        </div>`;
      }
    }
    if(day>=len||window._seasonRetro){
    html+=`<div class="box" id="season-retro">
      <div class="r-title" style="color:var(--blue)">${T('closeT')}</div>
      <div class="opts">
        <div class="opt ${window._seasonWon===true?'sel-x2':''}" onclick="pickWon(true)">${T('won')}</div>
        <div class="opt ${window._seasonWon===false?'sel-kl':''}" onclick="pickWon(false)">${T('lost')}</div>
      </div>
      <textarea id="sr-conv" placeholder="${T('convPh')}"></textarea>
      <div style="height:8px"></div>
      <textarea id="sr-burn" placeholder="${T('burnPh')}"></textarea>
      <div style="height:8px"></div>
      <textarea id="sr-chg" placeholder="${T('chgPh')}"></textarea>
      <button class="btn-g" id="btn-close-season" style="border-color:var(--blue);color:var(--blue)" onclick="closeSeason()">${T('closeBtn')}</button>
      ${(window._seasonRetro&&day<len)?`<div class="a-actions"><button class="btn-sm" style="flex:1" onclick="window._seasonRetro=false;render()">${T('cancel')}</button></div>`:''}
    </div>`;
    }

    /* квест недели: четыре уровневых блока, закрытые нормы — вниз в архив */
    const gOrder=(s.grpOrder&&s.grpOrder.length===4)?s.grpOrder:['goal','core','exp','body'];
    const lvlOf=t=>t.lvl||((t.role||'sup')==='goal'?'goal':'core');
    const GT={goal:[T('grpGoal'),'var(--blue)'],core:[T('tgCore'),'var(--gold)'],
      exp:[T('tgExp'),'var(--violet)'],body:[T('tgBody'),'var(--ember)']};
    const isDone=t=>{const n=Math.round(t.norm*2);return n>0&&(s.wk.done[t.id]||0)>=n};
    const openTracks=(s.tracks||[]).filter(t=>!isDone(t));
    const doneTracks=(s.tracks||[]).filter(isDone);
    let tHtml='';
    for(const k of gOrder){
      const list=openTracks.filter(t=>lvlOf(t)===k);
      if(!list.length)continue;
      const [gt,gc]=GT[k];
      tHtml+=`<div class="blk" data-lvl="${k}">
        <div class="lbl" style="margin:8px 0 7px;color:${gc}"><span class="drag" style="font-size:12px;padding:5px 9px 5px 2px" ontouchstart="event.preventDefault()" onpointerdown="blkStart(event)">≡</span>${gt}</div>
        <div class="tlist" data-lvl="${k}">${list.map(trackCard).join('')}</div></div>`;
    }
    const archHtml=doneTracks.length?`<details class="addf" style="margin:6px 0 2px"${window._wkArch?' open':''} ontoggle="window._wkArch=this.open">
      <summary>${T('wkArch')(doneTracks.length)}</summary>
      <div style="padding-top:10px">${doneTracks.map(trackCard).join('')}</div></details>`:'';
    html+=`<div class="box">
      <div class="quest-head"><span class="q-week">${T('week')} ${weekNum} · ${T('quest')}</span>
        <span class="q-streak">${st>0?'◆ '+st+' '+T('inRow'):T('streak0')}</span></div>
      <div class="q-status" style="color:${questOk?'var(--teal)':'var(--dim)'}">
        ${s.pause?T('pauseSt'):questOk?T('questOk'):T('qTracks')+doneTracks.length+'/'+(s.tracks||[]).length+' · '+T('qOut')+outWeek+'/'+(s.outGoal||0)+(outOk?' ✓':'')}</div>
      <div id="quest-blk">${tHtml||((s.tracks||[]).length?'':'<div class="empty" style="margin-bottom:9px">'+T('emptyT')+'</div>')}</div>
      ${archHtml}
    </div>`;
    const activeBets=state.allocs.filter(a=>!a.retro&&!a.killed&&a.done<a.total);
    html+=`<details class="addf"><summary>${T('addTrack')}</summary><div class="box">
      <div class="lbl">${T('tkName')}</div>
      <input type="text" id="tk-name" placeholder="${T('tkNamePh')}" maxlength="50">
      <div class="row" style="margin-top:12px">
        <div style="flex:1"><div class="lbl">${T('tkLevel')}</div>
          <select id="tk-lvl">
            <option value="goal">${T('lvGoal')}</option>
            <option value="core">${T('tgCore')}</option>
            <option value="exp">${T('tgExp')}</option>
            <option value="body">${T('tgBody')}</option>
          </select></div>
        <div style="width:100px"><div class="lbl">${T('tkNorm')}</div>
          <input type="text" id="tk-norm" inputmode="decimal" placeholder="5"></div>
      </div>
      <div class="lbl">${T('tkBind')}</div>
      <select id="tk-bet">
        <option value="">${T('tkNoBind')}</option>
        ${activeBets.map(a=>`<option value="${a.id}">${esc(a.name)} · ${fmt(a.de,2)} ${lang==='ru'?'ДЕ':'DU'}</option>`).join('')}
      </select>
      <button class="btn-g" onclick="addTrack()">${T('addTrackBtn')}</button>
    </div></details>`;
    html+=`<div class="box" style="text-align:center">
      <div class="stats" style="margin-bottom:10px">
        <div class="stat"><div class="v">${outWeek}${s.outGoal?' / '+s.outGoal:''}</div><div class="l">${T('outW')}</div></div>
        <div class="stat"><div class="v">${outSeason}</div><div class="l">${T('outS')}</div></div>
      </div>
      <button class="btn-out" onclick="addOut()">${T('outBtn')}</button>
      <div class="a-actions"><button class="btn-sm" style="flex:1" onclick="undoOut()">${T('outUndo')}</button></div>
    </div>`;
    if((s.weeks||[]).length){
      html+=`<div class="box"><div class="lbl" style="margin-top:0">${T('hist')}</div>
        <div class="wchips">${s.weeks.map(w=>
          `<span class="wchip ${w.paused?'':(w.ok?'w-ok':'w-no')}">${dstr(w.start)} ${w.paused?'⏸':(w.ok?'✓':'✗')} · ${fmt(w.hrs)}${T('h')} · ${w.out}${T('outAbbr')}</span>`).join('')}
        </div></div>`;
    }
  }
  if(state.seasons.length){
    html+='<div class="sec">'+T('archS')+'</div>';
    for(const a of state.seasons){
      const m=a.retro.won?{c:'var(--teal)',t:T('wonB')}:{c:'var(--ember)',t:T('lostB')};
      html+=`<div class="alloc arch" style="border-left-color:${a.retro.won?'var(--teal)':'var(--ember)'}">
        <div class="a-top"><div class="a-name">${T('season')}${esc(a.num)}</div>
          <div class="a-de">${a.outTotal||0} ${T('outAbbr')} · ${T('wk')} ${a.weeksWon||0}/${a.weeksTotal||0}</div></div>
        <div class="r-view">
          <div class="r-badge" style="color:${m.c}">${m.t}</div>
          <div class="q">${T('goalQ')}</div><div class="a">${esc(a.goal)}</div>
          <div class="q">${T('convQ')}</div><div class="a">${esc(a.retro.conv)}</div>
          ${a.retro.burn?`<div class="q">${T('burnQ')}</div><div class="a">${esc(a.retro.burn)}</div>`:''}
          ${a.retro.chg?`<div class="q">${T('chgQ')}</div><div class="a">${esc(a.retro.chg)}</div>`:''}
        </div>
        <div class="a-actions"><button class="btn-sm" style="flex:1${armed['se'+a.start]?';border-color:var(--ember);color:var(--ember)':''}" onclick="removeSeason(${a.start})">${armed['se'+a.start]?T('delArm'):T('delBtn')}</button></div>
      </div>`;
    }
  }
  el.innerHTML=html;
}

<details class="ref"><summary><span class="rtag" style="color:var(--gold)">TICAP</span><span class="rt">Что это</span></summary>
<div class="ref-body">
<p><b>Time Capital Allocation System</b> — система управления временем как капиталом. Час либо накапливается в навык, доход, здоровье — либо потрачен. TICAP делает накопление видимым и управляемым.</p>
<p><b>Разрыв «знаю → делаю»</b> закрывается механикой: слоты против распыления, ретро против самообмана, недельные квесты против длинной абстракции, kill-критерии против затягивания.</p>
<p><b>Прогрессия освоения:</b> начни с Аллокаций → добавь Сезон, когда тик станет привычкой → шпаргалки этой вкладки для глубины.</p>
</div></details>
<details class="ref"><summary><span class="rtag" style="color:var(--gold)">Ур.1</span><span class="rt">Аллокация и ДЕ</span></summary>
<div class="ref-body">
<p><b>Аллокация</b> — вложение времени в одно направление с бюджетом в ДЕ («Английский · 2 ДЕ»). Не задача и не привычка: у аллокации есть смета, шкала и обязательное ретро в конце.</p>
<p><b>1 ДЕ = 100 часов.</b> Учёт чекпоинтами по 30 минут.</p>
<p><b>Дельта</b> — разница «было → стало»: измеряется приращение, не потраченное время.</p>
<p><b>Разведка</b> нового направления — 0,1–0,2 ДЕ. <b>1 ДЕ</b> — достаточно данных для оценки направления.</p>
<p><b>Темп:</b> погружение — ДЕ за 3–4 недели; фоном — 2–3 месяца.</p>
<p><b>Правило ×1,5:</b> аллокация тянется в полтора раза дольше плана (месяц превратился в полтора) — закрывай её через ретро. Направление буксует, часы идут без дельты.</p>
</div></details>
<details class="ref"><summary><span class="rtag" style="color:var(--violet)">Ур.3</span><span class="rt">Три уровня + отбор</span></summary>
<div class="ref-body">
<p><b>Ядро (Core)</b> — долгие активы: навыки, денежный поток, инфраструктура. Не валидируется, не отсекается.</p>
<p><b>Эксперимент</b> — строго 1 слот. Меньше распыления и усталости от решений.</p>
<p><b>Носитель</b> — тело и энергия. Час на фоне боли даёт 40–60% номинала, поэтому носитель обслуживается до портфеля.</p>
<p><b>Цикл отбора:</b> разведка → полная аллокация → ретро → Удвоить / Пивот / Закрыть. Прошла отбор — следующая итерация больше.</p>
<p><b>Kill</b> — досрочное закрытие по критериям. Штатная операция отбора, не провал.</p>
<p><b>Ёмкость года:</b> при 12–15 ч/нед — 6–8 ДЕ валом. Сквозной Core (язык, тело, поток) съедает ~половину постоянно, на новые направления остаётся 2–3 ДЕ. Поэтому дефицит — слоты, не часы.</p>
</div></details>
<details class="ref"><summary><span class="rtag" style="color:var(--blue)">Ур.4</span><span class="rt">Сезон · механика</span></summary>
<div class="ref-body">
<p><b>Сезон</b> = 30/60/90 дней, одна бинарная цель.</p>
<p><b>План</b> — треки с недельными нормами: гипотеза «какой процесс произведёт цель». Уровни треков: Цель сезона / Ядро / Эксперимент / Носитель.</p>
<p><b>Квесты недели:</b> каждый трек — отдельный квест со своей нормой. Неделя ✓ = все квесты закрыты + норма исходящих. Неделя длится 7 дней от даты старта сезона и закрывается автоматически (✓/✗ в историю); подряд — серия побед.</p>
<p><b>Пауза</b> — протокол деградации: причина (болезнь / форс-мажор / отпуск) + дата возврата ≤14 дней. Лимит: всего 2 за сезон, отпуск — не более 1 (второй слот — резерв под болезнь и форс-мажор, их не планируют). Недели паузы — ⏸, серия ждёт. Третья пауза = kill сезона или ребаланс.</p>
<p><b>Ретро сезона</b> — два независимых вопроса: «план исполнен?» (недели ✓/✗) и «цель достигнута?». Исполнен + не достигнута = гипотеза неверна, менять план. Не исполнен = чинить исполнение, не идею.</p>
</div></details>
<details class="ref"><summary><span class="rtag" style="color:var(--blue)">Ур.4</span><span class="rt">Шпаргалка: цель · исходящие · kill</span></summary>

<p><b>Карьера:</b> «получен оффер» · «N собеседований пройдено» · «N откликов отправлено»</p>
<p><b>Навык:</b> «сдан тест уровня X» · «N часов вложено + пройдена веха»</p>
<p><b>Проект:</b> «опубликован / сдан» · «N единиц выпущено» · «MVP у N пользователей»</p>
<p><b>Деньги:</b> «первый платящий клиент» · «N продаж» · «подушка X собрана»</p>
<p><b>Тело:</b> «N недель нормы без пропуска» · «показатель X достигнут»</p>
<p><b>Разгребание:</b> «долг X закрыт» · «процесс Y доведён до статуса Z»</p>
<p><b>Не цель:</b> «стать лучше», «развивать», «разобраться», «начать» — процессы без исхода. Лечение: глагол совершенного вида + число + факт.</p>
<p><b>Исходящие</b> — касание мира, где возможен отказ: отклик, письмо, питч, публикация. НЕ исходящие: учёба, тренировки, производство «в стол». Тапай в момент отправки.</p>

</div></details>
<details class="ref"><summary><span class="rtag" style="color:#b08d6a">Свод</span><span class="rt">Принципы</span></summary>
<div class="ref-body">
<p><b>Глубина сильнее ширины</b> — второй ДЕ в ту же нишу дороже первого в новую.</p>

<p><b>Система для времени, которое ты вкладываешь. Время, которое ты живёшь, в учёте не нуждается.</b></p>
